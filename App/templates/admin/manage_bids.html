{% extends "admin/layout.html" %}
{% block title %}Manage Bids{% endblock %}

{% block content %}
<div class="mx-auto max-w-5xl">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-8 pb-10">
    {% for group in bid_groups %}
    <div class="rounded-2xl border border-slate-300 bg-white p-6 shadow-panel flex flex-col gap-4">
      <div class="font-semibold text-2xl text-slate-900">G{{ group.id }} {{ group.name }}</div>
      <div class="text-lg mb-4">Bids Made: {{ group.bids|length }}</div>
      <div class="flex justify-center mt-6">
        <form method="get" action="{{ url_for('admin_views.admin_view_group_bids', group_id=group.id) }}" class="w-full flex justify-center">
          <button type="submit" class="rounded-xl border border-slate-600 bg-slate-50 px-12 py-4 text-xl font-semibold text-slate-700 transition hover:bg-slate-100 w-full max-w-xs">View Bids</button>
        </form>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
