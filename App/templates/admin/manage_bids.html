{% extends "admin/layout.html" %} {% block title %}Manage Bids{% endblock %} {%
block content %}
<div class="mx-auto max-w-5xl">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 pb-10">
        {% for group in bid_groups %}
        <div
            class="rounded-2xl border border-slate-800 bg-slate-900 shadow overflow-hidden"
        >
            <div class="bg-slate-950 px-6 py-4 border-b border-slate-800">
                <div class="font-semibold text-2xl text-slate-100">
                    {{ group.name }}
                </div>
                <div class="text-lg text-slate-400">
                    Bids Made: {{ group.bids|length }}
                </div>
            </div>
            <div class="p-6">
                <div class="flex justify-center mt-6">
                    <form
                        method="get"
                        action="{{ url_for('admin_views.admin_view_group_bids', group_id=group.id) }}"
                        class="w-full flex justify-center"
                    >
                        <button
                            type="submit"
                            class="rounded-xl border border-slate-700 bg-slate-800 px-12 py-4 text-xl font-semibold text-slate-100 transition hover:bg-slate-700 w-full max-w-xs"
                        >
                            View Bids
                        </button>
                    </form>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
