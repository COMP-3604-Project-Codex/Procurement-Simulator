<div class="fixed inset-0 flex items-center justify-center bg-black/40">
    <div
        class="bg-slate-950 p-6 rounded-lg shadow-lg w-1/2 border border-slate-800"
    >
        <div
            class="flex justify-between items-center border-b border-slate-400 pb-4"
        >
            <h2 class="text-xl font-bold text-slate-100">RFP Details</h2>
            <button class="text-slate-300 hover:text-slate-100">&times;</button>
        </div>
        <div class="mt-4 space-y-4 text-slate-100">
            <p><strong>Type:</strong> {{ rfp_details.type }}</p>
            <p>
                <strong>Screen Size & Resolution:</strong> {{
                rfp_details.screen_size }}
            </p>
            <p><strong>Operating System(s):</strong> {{ rfp_details.os }}</p>
            <p><strong>CPU:</strong> {{ rfp_details.cpu }}</p>
            <p><strong>Memory (RAM):</strong> {{ rfp_details.memory }}</p>
            <p><strong>Hard Drive:</strong> {{ rfp_details.hard_drive }}</p>
            <p><strong>Graphics:</strong> {{ rfp_details.graphics }}</p>
        </div>
        <div class="mt-6 text-right">
            <button class="px-4 py-2 bg-gray-300 text-gray-700 rounded">
                Close
            </button>
        </div>
    </div>
</div>
