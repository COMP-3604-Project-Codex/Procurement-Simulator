{% extends "admin/layout.html" %}
{% block title %}Bids Placed By G{{ group.id }} {{ group.name }}{% endblock %}

{% block content %}
<div class="mx-auto max-w-4xl">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-8 pb-10">
    {% for bid in group.bids %}
    <div class="rounded-2xl border border-slate-300 bg-white p-6 shadow-panel flex flex-col gap-4">
      <div class="font-semibold text-xl text-slate-900">To: G{{ bid.to_group_id }} {{ bid.to_group_name }}</div>
      <div class="text-base text-slate-700 mb-2">TimeStamp :<br>{{ bid.timestamp }}</div>
      <form method="get" action="{{ url_for('admin_views.admin_view_bid_document', group_id=group.id, bid_id=bid.id) }}">
        <button type="submit" class="rounded-xl border border-slate-600 bg-slate-50 px-8 py-2 text-base font-semibold text-slate-700 transition hover:bg-slate-100 w-full">Bid Document</button>
      </form>
      <form method="post" action="{{ url_for('admin_views.admin_remove_bid', group_id=group.id, bid_id=bid.id) }}">
        <button type="submit" class="rounded-xl border border-red-600 bg-red-50 px-8 py-2 text-base font-semibold text-red-700 transition hover:bg-red-100 w-full">Remove</button>
      </form>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
