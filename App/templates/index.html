{% extends "layout.html" %}
{% block title %}Procurement Simulator{% endblock %}

{% block content %}
<div class="flex min-h-[75vh] items-center justify-center">

  <div class="w-full max-w-md rounded-2xl bg-white p-8 shadow-panel border border-slate-200">

    <!-- App Name -->
    <h1 class="text-center font-heading text-3xl text-slate-900">
      Procurement Simulator
    </h1>

    {% if is_authenticated %}
      <p class="mt-4 text-center text-sm text-emerald-600">
        Welcome {{current_user.username if current_user.is_admin() else current_user.name}}
      </p>
    {% else %}

    <!-- Login Form -->
    <form method="POST" action="/login" class="mt-8 flex flex-col gap-4">

      <input 
        name="username"
        type="text"
        placeholder="Username"
        required
        class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm focus:border-brand-500 focus:bg-white focus:outline-none transition"
      >

      <input 
        name="password"
        type="password"
        placeholder="Password"
        required
        class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm focus:border-brand-500 focus:bg-white focus:outline-none transition"
      >

      <button 
        type="submit"
        class="mt-2 w-full rounded-xl bg-brand-500 py-3 text-sm font-semibold text-white transition hover:bg-brand-600"
      >
        Login
      </button>

    </form>

    {% endif %}
  </div>

</div>
{% endblock %}
