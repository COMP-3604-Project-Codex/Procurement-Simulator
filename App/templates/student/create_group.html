{% extends "student/layout.html" %}
{% block title %}Create Group | Procurement Simulator{% endblock %}

{% block content %}
<div class="mx-auto max-w-5xl space-y-8">
  <form action="{{ url_for('student_views.student_create_group_page') }}" method="POST" class="space-y-5 rounded-2xl border border-slate-300 bg-white p-6 shadow-panel">
      <div>
        <label class="mb-2 block text-sm font-semibold text-slate-700" for="group-name">Group Name</label>
        <input id="group-name" name="group_name" type="text" placeholder="Name of Group" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-base text-slate-900 placeholder:text-slate-400 focus:border-brand-500 focus:bg-white focus:outline-none">
      </div>
      <div>
        <label class="mb-2 block text-sm font-semibold text-slate-700" for="member-search">Search Members</label>
        <input id="member-search" type="text" placeholder="Search for Members" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-base text-slate-900 placeholder:text-slate-400 focus:border-brand-500 focus:bg-white focus:outline-none">
      </div>

      <section class="rounded-2xl border border-slate-300 bg-white p-5 shadow-panel">
          <div class="max-h-[360px] overflow-y-auto pr-2">
            <ul class="divide-y divide-slate-200">
              {% for candidate in candidates %}
                <li class="candidate-item flex items-center justify-between gap-4 py-4"
                  data-name="{{ candidate.name|lower }}"
                  data-id="{{ candidate.student_id|lower }}">
                  <label class="flex w-full cursor-pointer items-center justify-between">
                    <span class="text-xl font-medium text-slate-800">{{ candidate.name }} ({{ candidate.student_id }})</span>
                    
                    <div class="relative flex items-center">
                      <input type="checkbox" name="members" value="{{ candidate.id }}" 
                              class="h-6 w-6 rounded-full border-2 border-slate-500 text-brand-500 focus:ring-brand-500"
                              {% if candidate.selected %}checked{% endif %}>
                    </div>
                  </label>
                </li>
              {% endfor %}
            </ul>
            <p id="no-results" class="hidden text-center text-slate-500 py-4">No members found</p>
          </div>
        </section>

        <div class="flex justify-center">
          <button type="submit" class="rounded-xl border border-slate-900 bg-white px-14 py-3 text-xl font-semibold text-slate-900 transition hover:bg-slate-100">Submit Group Request</button>
        </div>
   </form>
  </div>
  <script>
    const searchInput = document.getElementById('member-search');
    const candidates = document.querySelectorAll('.candidate-item');
    const noResults = document.getElementById('no-results');

    searchInput.addEventListener('input', function () {
      const query = this.value.toLowerCase();
      let visible = 0;

      candidates.forEach(candidate => {
        const name = candidate.dataset.name;
        const id = candidate.dataset.id;

        if (name.includes(query) || id.includes(query)) {
          candidate.style.display = 'flex';
          visible++;
        } else {
          candidate.style.display = 'none';
        }
      });

      noResults.classList.toggle('hidden', visible !== 0);
    });
  </script>

{% endblock %}
