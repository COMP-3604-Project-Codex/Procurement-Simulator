{% extends "student/layout.html" %}
{% block title %}Create Group | Procurement Simulator{% endblock %}

{% block content %}
<div class="mx-auto max-w-5xl space-y-8">
  <form class="space-y-5 rounded-2xl border border-slate-300 bg-white p-6 shadow-panel">
    <div>
      <label class="mb-2 block text-sm font-semibold text-slate-700" for="group-name">Group Name</label>
      <input id="group-name" type="text" placeholder="Name of Group" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-base text-slate-900 placeholder:text-slate-400 focus:border-brand-500 focus:bg-white focus:outline-none">
    </div>
    <div>
      <label class="mb-2 block text-sm font-semibold text-slate-700" for="member-search">Search Members</label>
      <input id="member-search" type="text" placeholder="Search for Members" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-base text-slate-900 placeholder:text-slate-400 focus:border-brand-500 focus:bg-white focus:outline-none">
    </div>
  </form>

  <section class="rounded-2xl border border-slate-300 bg-white p-5 shadow-panel">
    <div class="max-h-[360px] overflow-y-auto pr-2">
      <ul class="divide-y divide-slate-200">
        {% for candidate in candidates %}
          <li class="flex items-center justify-between gap-4 py-4">
            <span class="text-xl font-medium text-slate-800">{{ candidate.name }}({{ candidate.student_id }})</span>
            <span class="inline-flex h-8 w-8 items-center justify-center rounded-full border-2 {% if candidate.selected %}border-brand-500 bg-brand-500{% else %}border-slate-500 bg-white{% endif %}">
              {% if candidate.selected %}
                <span class="h-3.5 w-3.5 rounded-full bg-white"></span>
              {% endif %}
            </span>
          </li>
        {% endfor %}
      </ul>
    </div>
  </section>

  <div class="flex justify-center">
    <button type="button" class="rounded-xl border border-slate-900 bg-white px-14 py-3 text-xl font-semibold text-slate-900 transition hover:bg-slate-100">Submit</button>
  </div>
</div>
{% endblock %}
